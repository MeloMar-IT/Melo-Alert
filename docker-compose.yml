services:
  signalhub:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DATABASE_DSN=postgres://user:password@db:5432/signalhub?sslmode=disable
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=signalhub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
